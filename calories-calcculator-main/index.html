<!DOCTYPE html>
<html>
<head>
  <title>Calorie Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Calorie Calculator</h1>
  <section class="container">    
    <div class="input-group">
      <label for="activity">Activity:</label>
       <select id="activity">
        <option value="running">Running</option>
        <option value="walking">Walking</option>
       </select>
    </div>
    <div class="input-group">
      <label for="steps">Number of Steps:</label>
      <input type="number" id="steps" placeholder="Enter steps">
    </div>
    <div class="input-group">
      <label for="weight">Weight (kg):</label>
      <input type="number" id="weight" placeholder="Enter weight">
    </div>
  <div class="input-group">
    <label for="height">Height (cm):</label>
    <input type="number" id="height" placeholder="Enter height">
  </div>
  <div class="input-group">
    <label for="meters">Distance (meters):</label>
    <input type="number" id="meters" placeholder="Enter distance in meters">
  </div>
  <div class="input-group">
    <label for="minutes">Minutes Run:</label>
    <input type="number" id="minutes" placeholder="Enter time in minutes">
  </div>
  <button onclick="calculateCalories()">Calculate Calories</button>  
  <p id="result"></p>
  <script src="script.js"></script>
</section>
</body>
</html>
